<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RMC MockupTool</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./js/CSInterface.js"></script>
  <script src="./js/app.js" defer></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="header-spacer" aria-hidden="true"></div>
      <div class="header-logo-slot">
        <img src="./assets/logo rmc.svg" alt="RMC" class="header-logo header-logo-rmc">
      </div>
      <div class="topbar-actions">
        <button id="resetUi" class="reset-button" type="button" title="Limpiar Excel y filtros" aria-label="Limpiar Excel y filtros">↻</button>
        <span id="cepStatus" class="status-pill">
          <span class="status-dot"></span>
          <span id="cepStatusText">CEP</span>
        </span>
      </div>
    </header>

    <form id="form" class="workspace">
      <section class="main-panel">
        <div class="mode-tabs" role="radiogroup" aria-label="Seccion">
          <label><input type="radio" name="mode" value="bulk" checked> Personalizadas</label>
          <label><input type="radio" name="mode" value="samples"> Genericas</label>
        </div>

        <div class="field-grid">
          <label class="field field-full">Excel
            <span class="path-row">
              <input id="excelPath" name="excelPath" readonly placeholder="Selecciona archivo .xlsx">
              <button class="browse-button" type="button" data-browse="file" data-target="excelPath">...</button>
            </span>
          </label>

          <label class="field field-full">Salida
            <span class="path-row">
              <input id="out" name="out" value="/Volumes/Fullsize/TO PRINT/NIKE ORDERS/LISTAS ON DEMAND" readonly>
              <button class="browse-button" type="button" data-browse="folder" data-target="out">...</button>
            </span>
          </label>

          <input id="mockups" name="mockups" type="hidden" value="/Volumes/Fullsize/PATRONES ACOMODADOS PARA ROLLO/NIKE LACROSSE/RMCOp-NIKE/MOCKUPS">
          <input id="signaturesDir" name="signaturesDir" type="hidden" value="/Volumes/Fullsize/PATRONES ACOMODADOS PARA ROLLO/NIKE LACROSSE/RMCOp-NIKE/FIRMAS">
          <input id="font" name="font" type="hidden" value="/Users/rmlsub1/Library/Fonts/Aldrich-Regular.ttf">

          <label class="field designer-field">Disenador
            <select id="designer" name="designer">
              <option value="F-ALBERTO" selected>F-ALBERTO</option>
              <option value="F-THANIA">F-THANIA</option>
              <option value="F-ANTONIO">F-ANTONIO</option>
            </select>
          </label>
        </div>

        <div class="action-row">
          <button id="validateIncremental" class="secondary-button" type="button">Validar</button>
          <button id="submit" class="primary-button" type="submit">Generar PDFs</button>
          <button id="previewPrint" class="secondary-button" type="button">Revisar cola</button>
          <button id="printQueue" class="secondary-button danger" type="button">Imprimir cola</button>
        </div>
      </section>

      <aside class="side-panel">
        <section class="summary-panel" aria-label="Revision antes de procesar">
          <h2>Revision</h2>
          <div class="summary-grid">
            <div class="summary-card">
              <span>Modo</span>
              <strong id="summaryMode">Personalizadas</strong>
            </div>
            <div class="summary-card">
              <span>Filas</span>
              <strong id="summaryRows">0</strong>
            </div>
            <div class="summary-card">
              <span>Style</span>
              <strong id="summaryStyles">Todos</strong>
            </div>
            <div class="summary-card">
              <span>Tallas</span>
              <strong id="summarySizes">Todas</strong>
            </div>
          </div>
        </section>

        <section id="filters" class="filters" hidden>
          <div class="filter-block">
            <div class="filter-head">
              <span>Style</span>
              <label class="check all-check"><input id="allStyles" type="checkbox" checked> Todos</label>
            </div>
            <div id="styleOptions" class="filter-grid"></div>
          </div>

          <div class="filter-block">
            <div class="filter-head">
              <span>Tallas</span>
              <label class="check all-check"><input id="allSizes" type="checkbox" checked> Todas</label>
            </div>
            <div id="sizeOptions" class="filter-grid compact"></div>
          </div>
        </section>

      </aside>
    </form>

    <section id="log-container">
      <div class="log-header">
        Log de Consola
        <button id="btnClearLog" type="button">Limpiar</button>
      </div>
      <div id="terminal"></div>
    </section>

    <footer class="footer-credits">
      Creado por Jose Alberto Villarreal Garcia
    </footer>
  </main>
</body>
</html>
